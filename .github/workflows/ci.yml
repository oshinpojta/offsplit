name: Offsplit CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: offsplit-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  workers:
    name: Workers — engine vectors/properties + API routes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # node:sqlite (the test D1 shim) needs >= 22.5
          cache: pnpm
          cache-dependency-path: workers/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test

  engine-dart:
    name: Engine (Dart) — same golden vectors
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
